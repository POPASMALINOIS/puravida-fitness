<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PuraVida Fitness</title>

  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="PuraVida Fitness">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-container">

  <!-- LOGIN -->
  <section id="login-screen" class="screen active">
    <div class="card">
      <h1>PuraVida Fitness</h1>
      <p>Gestión profesional de gimnasio</p>

      <input type="text" id="usuario" placeholder="Usuario">
      <input type="password" id="password" placeholder="Contraseña">

      <button onclick="login()">Acceder</button>
    </div>
  </section>

  <!-- DASHBOARD -->
  <section id="dashboard-screen" class="screen">
    <header class="dashboard-header">
      <h1>PuraVida Fitness</h1>
      <button onclick="logout()">Cerrar sesión</button>
    </header>

    <main class="dashboard-grid">
      <div class="dashboard-card" onclick="mostrarModulo('clientes')">
        <h2>Clientes</h2>
        <p>Gestión de socios</p>
      </div>

      <div class="dashboard-card" onclick="mostrarModulo('rutinas')">
        <h2>Rutinas</h2>
        <p>Entrenamientos</p>
      </div>

      <div class="dashboard-card" onclick="mostrarModulo('clases')">
        <h2>Clases</h2>
        <p>Calendario y reservas</p>
      </div>

      <div class="dashboard-card" onclick="mostrarModulo('pagos')">
        <h2>Pagos</h2>
        <p>Cuotas y facturación</p>
      </div>
    </main>
  </section>

  <!-- CLIENTES -->
  <section id="clientes-screen" class="screen">
    <header class="dashboard-header">
      <h1>Clientes</h1>
      <button onclick="volverDashboard()">Volver</button>
    </header>

    <div class="card">
      <input type="text" id="clienteNombre" placeholder="Nombre del cliente">
      <input type="text" id="clienteTelefono" placeholder="Teléfono">
      <button onclick="agregarCliente()">Agregar cliente</button>
    </div>

    <div class="clientes-lista" id="clientesLista"></div>
  </section>

</div>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
