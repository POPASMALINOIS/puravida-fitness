<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PuraVida Fitness</title>

  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="PuraVida Fitness">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css?v=4">
</head>
<body>

<div class="app-container">

  <!-- LOGIN -->
  <section id="login-screen" class="screen active">
    <div class="card">
      <h1>PuraVida Fitness</h1>
      <p>Gestión profesional de clientes fitness</p>

      <input type="text" id="usuario" placeholder="Usuario">
      <input type="password" id="password" placeholder="Contraseña">

      <button onclick="login()">Acceder</button>
    </div>
  </section>

  <!-- CLIENTES PANEL -->
  <section id="clientes-screen" class="screen">
    <header class="dashboard-header">
      <h1>Clientes</h1>
      <button onclick="logout()">Cerrar sesión</button>
    </header>

    <div class="card">
      <input type="text" id="clienteNombre" placeholder="Nombre del cliente">
      <input type="text" id="clienteTelefono" placeholder="Teléfono">
      <input type="email" id="clienteEmail" placeholder="Email">
      <input type="date" id="clienteFechaAlta">
      <input type="number" id="clienteCuota" placeholder="Cuota mensual (€)">
      <input type="number" id="clienteBono" placeholder="Sesiones bono">

      <select id="clienteEstado">
        <option value="Activo">Activo</option>
        <option value="Inactivo">Inactivo</option>
      </select>

      <textarea id="clienteObservaciones" placeholder="Observaciones"></textarea>

      <button onclick="agregarCliente()">Agregar cliente</button>
    </div>

    <div class="clientes-lista" id="clientesLista"></div>
  </section>

  <!-- FICHA CLIENTE -->
  <section id="ficha-screen" class="screen">
    <header class="dashboard-header">
      <h1>Ficha Cliente</h1>
      <button onclick="volverClientes()">Volver</button>
    </header>

    <div class="cliente-ficha" id="clienteFicha"></div>
  </section>

</div>

<script src="app.js?v=6"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
