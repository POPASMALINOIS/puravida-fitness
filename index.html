<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PuraVida Fitness</title>

  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css?v=7">
</head>
<body>

<div class="app-layout">

  <!-- LOGIN -->
  <section id="login-screen" class="screen active">
    <div class="card">
      <h1>PuraVida Fitness</h1>
      <p>Gestión premium de clientes fitness</p>

      <input type="text" id="usuario" placeholder="Usuario">
      <input type="password" id="password" placeholder="Contraseña">

      <button onclick="login()">Acceder</button>
    </div>
  </section>

  <!-- DASHBOARD -->
  <section id="dashboard-screen" class="screen">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">
        <h2>PuraVida</h2>
        <span>FITNESS</span>
      </div>

      <nav>
        <button onclick="mostrarSeccion('clientes')">Clientes</button>
        <button onclick="mostrarSeccion('clases')">Clases</button>
        <button onclick="mostrarSeccion('calendario')">Calendario</button>
        <button onclick="mostrarSeccion('pagos')">Pagos</button>
        <button onclick="mostrarSeccion('rutinas')">Rutinas</button>
        <button onclick="mostrarSeccion('controles')">Controles</button>
        <button onclick="mostrarSeccion('recordatorios')">Recordatorios</button>
        <button onclick="mostrarSeccion('ajustes')">Ajustes</button>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-panel">

      <header class="top-header">
        <h1>Clientes</h1>
        <button onclick="logout()">Salir</button>
      </header>

      <!-- RESUMEN -->
      <section class="resumen-grid">
        <div class="resumen-card">
          <strong id="totalClientes">0</strong>
          <span>Total clientes</span>
        </div>

        <div class="resumen-card">
          <strong id="clientesActivos">0</strong>
          <span>Activos</span>
        </div>

        <div class="resumen-card">
          <strong id="bonosBajos">0</strong>
          <span>Bonos bajos</span>
        </div>

        <div class="resumen-card">
          <strong id="clasesHoy">0</strong>
          <span>Clases hoy</span>
        </div>
      </section>

      <!-- TOOLBAR -->
      <section class="toolbar">
        <input type="text" id="buscadorClientes" placeholder="Buscar cliente..." oninput="renderClientes()">
        <button class="add-btn" onclick="cambiarPantalla('alta-screen')">+ Añadir cliente</button>
      </section>

      <!-- CALENDARIO GENERAL -->
      <section class="calendario-panel">
        <div class="calendario-header">
          <h2>Planificación general</h2>
          <span>Todas las clases programadas</span>
        </div>

        <div class="calendario-form">
          <select id="calendarioClienteSelect"></select>
          <input type="date" id="generalClaseFecha">
          <input type="time" id="generalClaseHora">
          <button class="add-btn" onclick="agendarClaseGeneral()">Guardar clase</button>
        </div>

        <div id="calendarioGeneral" class="calendario-lista"></div>
      </section>

      <!-- TABLA CLIENTES -->
      <section class="tabla-clientes">
        <div class="tabla-header">
          <span>Cliente</span>
          <span>Teléfono</span>
          <span>Bono</span>
          <span>Estado</span>
          <span>Acciones</span>
        </div>

        <div id="clientesLista"></div>
      </section>

    </main>
  </section>

  <!-- ALTA CLIENTE -->
  <section id="alta-screen" class="screen">
    <header class="dashboard-header">
      <h1>Nuevo Cliente</h1>
      <button onclick="volverDashboard()">Volver</button>
    </header>

    <div class="card">
      <input type="text" id="clienteNombre" placeholder="Nombre del cliente">
      <input type="text" id="clienteTelefono" placeholder="Teléfono">
      <input type="email" id="clienteEmail" placeholder="Email">
      <input type="date" id="clienteFechaAlta">
      <input type="number" id="clienteCuota" placeholder="Cuota mensual (€)">
      <input type="number" id="clienteBono" placeholder="Sesiones bono">

      <select id="clienteEstado">
        <option value="Activo">Activo</option>
        <option value="Inactivo">Inactivo</option>
      </select>

      <textarea id="clienteObservaciones" placeholder="Observaciones"></textarea>

      <button onclick="agregarCliente()">Guardar cliente</button>
    </div>
  </section>

  <!-- FICHA CLIENTE -->
  <section id="ficha-screen" class="screen">
    <header class="dashboard-header">
      <h1>Ficha Cliente</h1>
      <button onclick="volverDashboard()">Volver</button>
    </header>

    <div class="cliente-ficha" id="clienteFicha"></div>
  </section>

</div>

<script src="app.js?v=9"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
